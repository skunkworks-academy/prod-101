name: Bootstrap course governance

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap-course-governance.yml

permissions:
  contents: read
  issues: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Create labels, milestones and initial backlog
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const labels = [
              ['type: epic','5319E7','Milestone-level outcome'],
              ['type: task','1D76DB','Delivery task'],
              ['type: blocker','B60205','Blocked work requiring escalation'],
              ['type: meeting','0E8A16','Meeting minutes and decisions'],
              ['type: qa','D93F0B','Quality review or defect'],
              ['workstream: governance','0052CC','Governance and planning'],
              ['workstream: content','0075CA','Course architecture scripts and learner assets'],
              ['workstream: production','006B75','Recording editing captions and media'],
              ['workstream: publishing','7057FF','Udemy configuration and publication'],
              ['workstream: marketing','E99695','Launch and lifecycle marketing'],
              ['workstream: roi','FBCA04','Time cost revenue and ROI'],
              ['priority: P0','B60205','Critical blocker'],
              ['priority: P1','D93F0B','High priority'],
              ['priority: P2','FBCA04','Normal priority'],
              ['priority: P3','C5DEF5','Low priority'],
              ['status: ready','0E8A16','Ready to start'],
              ['status: in-progress','1D76DB','Work in progress'],
              ['status: in-review','5319E7','Awaiting review'],
              ['status: blocked','B60205','Blocked'],
              ['module: M01','C2E0C6','Introduction to Productivity'],
              ['module: M02','C2E0C6','Goal Setting'],
              ['module: M03','C2E0C6','Time Management Techniques'],
              ['module: M04','C2E0C6','Eliminating Distractions'],
              ['module: M05','C2E0C6','Efficient Task Management'],
              ['module: M06','C2E0C6','Effective Communication'],
              ['module: M07','C2E0C6','Mindset and Motivation'],
              ['module: M08','C2E0C6','Habit Formation']
            ];

            const currentLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {owner, repo, per_page: 100});
            const labelMap = new Map(currentLabels.map(x => [x.name, x]));
            for (const [name, color, description] of labels) {
              if (labelMap.has(name)) {
                await github.rest.issues.updateLabel({owner, repo, name, color, description});
              } else {
                await github.rest.issues.createLabel({owner, repo, name, color, description});
              }
            }

            const milestoneDefs = [
              ['M0 — Governance and baseline','Project controls, source inventory, backlog and commercial baseline approved','2026-07-17T21:59:59Z'],
              ['M1 — Course architecture and content plan','Eight-module blueprint, outcomes, assessments and production plan approved','2026-07-24T21:59:59Z'],
              ['M2 — Scripts, slides and learner assets','Recording-ready scripts, slides, workbook and assessments approved','2026-08-07T21:59:59Z'],
              ['M3 — Recording and post-production','All video, audio, captions and lesson exports complete','2026-08-21T21:59:59Z'],
              ['M4 — QA, proof and release candidate','Instructional, language, media, accessibility and platform QA passed','2026-08-28T21:59:59Z'],
              ['M5 — Udemy publication','Course approved and publicly available','2026-09-04T21:59:59Z'],
              ['M6 — Launch marketing','Launch campaign and partner promotion complete','2026-09-18T21:59:59Z'],
              ['M7 — 90-day ROI validation','Actual time, cost, revenue and lifecycle decision recorded','2026-12-04T21:59:59Z']
            ];

            const currentMilestones = await github.paginate(github.rest.issues.listMilestones, {owner, repo, state: 'all', per_page: 100});
            const milestoneMap = new Map(currentMilestones.map(x => [x.title, x.number]));
            for (const [title, description, due_on] of milestoneDefs) {
              if (!milestoneMap.has(title)) {
                const created = await github.rest.issues.createMilestone({owner, repo, title, description, due_on});
                milestoneMap.set(title, created.data.number);
              }
            }

            const issueDefs = [
              ['[EPIC] M0 Governance and baseline','M0 — Governance and baseline',['type: epic','workstream: governance','priority: P0']],
              ['Approve project charter and role ownership','M0 — Governance and baseline',['type: task','workstream: governance','priority: P0']],
              ['Inventory and version the source outline manuscript and presentation','M0 — Governance and baseline',['type: task','workstream: governance','priority: P1']],
              ['Approve time budget cost assumptions and ROI targets','M0 — Governance and baseline',['type: task','workstream: roi','priority: P1']],
              ['Create GitHub Project views fields and automation','M0 — Governance and baseline',['type: task','workstream: governance','priority: P1']],
              ['Record weekly production review cadence and first meeting minutes','M0 — Governance and baseline',['type: meeting','workstream: governance','priority: P2']],

              ['[EPIC] M1 Course architecture and content plan','M1 — Course architecture and content plan',['type: epic','workstream: content','priority: P0']],
              ['Validate learner personas course promise and positioning','M1 — Course architecture and content plan',['type: task','workstream: content','priority: P1']],
              ['Rewrite measurable course and module learning outcomes','M1 — Course architecture and content plan',['type: task','workstream: content','priority: P1']],
              ['Create objective content activity and assessment alignment matrix','M1 — Course architecture and content plan',['type: task','workstream: content','priority: P1']],
              ['Approve lecture map sequencing and runtime budget','M1 — Course architecture and content plan',['type: task','workstream: content','priority: P1']],
              ['Audit source content for duplication placeholders and unsupported claims','M1 — Course architecture and content plan',['type: qa','workstream: content','priority: P1']],
              ['Approve reference copyright and source citation policy','M1 — Course architecture and content plan',['type: task','workstream: governance','priority: P1']],
              ['Approve recording visual audio and file standards','M1 — Course architecture and content plan',['type: task','workstream: production','priority: P1']],

              ['[EPIC] M2 Scripts slides and learner assets','M2 — Scripts, slides and learner assets',['type: epic','workstream: content','priority: P0']],
              ['Build M01 recording-ready content pack','M2 — Scripts, slides and learner assets',['type: task','workstream: content','module: M01','priority: P1']],
              ['Build M02 recording-ready content pack','M2 — Scripts, slides and learner assets',['type: task','workstream: content','module: M02','priority: P1']],
              ['Build M03 recording-ready content pack','M2 — Scripts, slides and learner assets',['type: task','workstream: content','module: M03','priority: P1']],
              ['Build M04 recording-ready content pack','M2 — Scripts, slides and learner assets',['type: task','workstream: content','module: M04','priority: P1']],
              ['Build M05 recording-ready content pack','M2 — Scripts, slides and learner assets',['type: task','workstream: content','module: M05','priority: P1']],
              ['Build M06 recording-ready content pack','M2 — Scripts, slides and learner assets',['type: task','workstream: content','module: M06','priority: P1']],
              ['Build M07 recording-ready content pack','M2 — Scripts, slides and learner assets',['type: task','workstream: content','module: M07','priority: P1']],
              ['Build M08 recording-ready content pack','M2 — Scripts, slides and learner assets',['type: task','workstream: content','module: M08','priority: P1']],
              ['Create full-course slide design system and master deck','M2 — Scripts, slides and learner assets',['type: task','workstream: content','priority: P1']],
              ['Create learner workbook templates and action tools','M2 — Scripts, slides and learner assets',['type: task','workstream: content','priority: P1']],
              ['Create quizzes practical assignments and answer guidance','M2 — Scripts, slides and learner assets',['type: task','workstream: content','priority: P1']],
              ['Complete recording-readiness proof and approval','M2 — Scripts, slides and learner assets',['type: qa','workstream: content','priority: P0']],

              ['[EPIC] M3 Recording and post-production','M3 — Recording and post-production',['type: epic','workstream: production','priority: P0']],
              ['Complete studio and recording workflow test','M3 — Recording and post-production',['type: task','workstream: production','priority: P0']],
              ['Record and edit course promo video','M3 — Recording and post-production',['type: task','workstream: production','priority: P1']],
              ['Record modules M01 to M04','M3 — Recording and post-production',['type: task','workstream: production','priority: P1']],
              ['Record modules M05 to M08','M3 — Recording and post-production',['type: task','workstream: production','priority: P1']],
              ['Edit caption and export modules M01 to M04','M3 — Recording and post-production',['type: task','workstream: production','priority: P1']],
              ['Edit caption and export modules M05 to M08','M3 — Recording and post-production',['type: task','workstream: production','priority: P1']],
              ['Reconcile final lecture count runtime and media inventory','M3 — Recording and post-production',['type: task','workstream: production','priority: P1']],

              ['[EPIC] M4 QA proof and release candidate','M4 — QA, proof and release candidate',['type: epic','workstream: governance','priority: P0']],
              ['Perform instructional design and factual QA','M4 — QA, proof and release candidate',['type: qa','workstream: content','priority: P0']],
              ['Perform language proof and consistency review','M4 — QA, proof and release candidate',['type: qa','workstream: content','priority: P1']],
              ['Perform video audio caption and accessibility QA','M4 — QA, proof and release candidate',['type: qa','workstream: production','priority: P0']],
              ['Conduct pilot learner review and remediate findings','M4 — QA, proof and release candidate',['type: qa','workstream: content','priority: P1']],
              ['Approve final release candidate and accepted risks','M4 — QA, proof and release candidate',['type: task','workstream: governance','priority: P0']],

              ['[EPIC] M5 Udemy publication','M5 — Udemy publication',['type: epic','workstream: publishing','priority: P0']],
              ['Finalise Udemy landing page instructor profile and creative','M5 — Udemy publication',['type: task','workstream: publishing','priority: P1']],
              ['Upload and configure curriculum resources captions and messages','M5 — Udemy publication',['type: task','workstream: publishing','priority: P0']],
              ['Complete Udemy release checklist and submit for review','M5 — Udemy publication',['type: qa','workstream: publishing','priority: P0']],
              ['Resolve Udemy review feedback and publish','M5 — Udemy publication',['type: task','workstream: publishing','priority: P0']],
              ['Record public course URL publication evidence and actual investment','M5 — Udemy publication',['type: task','workstream: roi','priority: P1']],

              ['[EPIC] M6 Launch marketing','M6 — Launch marketing',['type: epic','workstream: marketing','priority: P0']],
              ['Produce launch creative clips lead magnet and tracking links','M6 — Launch marketing',['type: task','workstream: marketing','priority: P1']],
              ['Execute social and email launch campaign','M6 — Launch marketing',['type: task','workstream: marketing','priority: P1']],
              ['Execute partner affiliate and influencer outreach','M6 — Launch marketing',['type: task','workstream: marketing','priority: P2']],
              ['Complete 30-day commercial and learner experience review','M6 — Launch marketing',['type: task','workstream: roi','priority: P1']],

              ['[EPIC] M7 ROI validation and lifecycle','M7 — 90-day ROI validation',['type: epic','workstream: roi','priority: P0']],
              ['Complete 60-day performance and optimisation review','M7 — 90-day ROI validation',['type: task','workstream: roi','priority: P1']],
              ['Complete 90-day actual ROI and break-even analysis','M7 — 90-day ROI validation',['type: task','workstream: roi','priority: P0']],
              ['Approve continue optimise re-record reprice bundle or retire decision','M7 — 90-day ROI validation',['type: task','workstream: roi','priority: P0']],
              ['Schedule and complete 180-day content currency review','M7 — 90-day ROI validation',['type: task','workstream: content','priority: P2']]
            ];

            const existingItems = await github.paginate(github.rest.issues.listForRepo, {owner, repo, state: 'all', per_page: 100});
            const issueMap = new Map(existingItems.filter(x => !x.pull_request).map(x => [x.title, x]));
            for (const [title, milestoneTitle, issueLabels] of issueDefs) {
              if (issueMap.has(title)) continue;
              const body = [
                `**Milestone:** ${milestoneTitle}`,
                '',
                '## Objective',
                'Deliver the named outcome in accordance with the project charter, roadmap and quality gates.',
                '',
                '## Required controls',
                '- [ ] Owner assigned',
                '- [ ] Due date confirmed',
                '- [ ] Planned hours recorded',
                '- [ ] Dependencies identified',
                '- [ ] Acceptance evidence linked',
                '- [ ] Actual hours added to `data/time-log.csv`',
                '- [ ] Review comments resolved',
                '',
                '## Completion evidence',
                'Add repository paths, review records, media links, platform URLs or screenshots that prove acceptance.'
              ].join('\n');
              await github.rest.issues.create({
                owner, repo, title, body,
                labels: [...issueLabels, 'status: ready'],
                milestone: milestoneMap.get(milestoneTitle)
              });
            }

            core.summary.addHeading('Course governance bootstrap complete');
            core.summary.addRaw(`Created or verified ${labels.length} labels, ${milestoneDefs.length} milestones and ${issueDefs.length} backlog items.`).write();
