name: Blocker
description: Escalate a dependency, decision, access, quality or delivery blocker.
title: "[BLOCKER] "
labels: []
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0 Critical - publication or legal/privacy blocker
        - P1 High - critical path at risk
        - P2 Normal - local task blocked
        - P3 Low - improvement dependency
    validations:
      required: true
  - type: input
    id: blocked_issue
    attributes:
      label: Blocked issue or milestone
      placeholder: "#12 or M3 Recording and post-production"
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: State schedule, effort, quality and ROI impact.
    validations:
      required: true
  - type: textarea
    id: root_cause
    attributes:
      label: Known or suspected root cause
    validations:
      required: true
  - type: textarea
    id: resolution
    attributes:
      label: Required decision or resolution
      description: Identify the owner and latest acceptable resolution date.
    validations:
      required: true
  - type: input
    id: owner
    attributes:
      label: Resolution owner
    validations:
      required: true
  - type: input
    id: resolve_by
    attributes:
      label: Resolve by
      placeholder: "2026-08-01"
    validations:
      required: true
  - type: textarea
    id: workaround
    attributes:
      label: Workaround and residual risk
